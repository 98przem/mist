name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile Swift app
        # Same flags as the Makefile 'app'/'bundle' targets. This gates the
        # build so a broken MistApp.swift can't land unnoticed.
        run: swiftc -O -parse-as-library -o /tmp/Mist MistApp.swift
