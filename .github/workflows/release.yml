name: Release

# Push a version tag (e.g. `git tag v1.0.0 && git push origin v1.0.0`) to build
# the app + bundled tools on a macOS runner and publish a downloadable DMG to a
# GitHub Release. Also runnable manually (uploads the DMG as a run artifact).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest   # Apple Silicon; builds osx-arm64
    steps:
      - uses: actions/checkout@v4

      # macos-latest runners ship with an Android SDK/NDK, several Xcode
      # versions' worth of simulator runtimes, and a Haskell toolchain
      # preinstalled — none needed here, but collectively large enough to leave
      # too little free space for hdiutil to build a DMG ("No space left on
      # device"), which has now hit release builds more than once.
      - name: Free up disk space for the DMG build
        run: |
          sudo rm -rf /Users/runner/Library/Android \
                      /Library/Developer/CoreSimulator/Profiles/Runtimes \
                      /opt/ghc || true
          df -h /

      # The relay targets net10; the patched DepotDownloader targets net9 (its
      # global.json rolls forward, but install both SDKs to be safe).
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Build DMG + zip (app + bundled tools)
        # Bake the tag (minus the leading "v") into the app as its marketing
        # version so the in-app updater can compare against future releases.
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          make release VERSION="${VERSION:-0.0.0}"

      - name: Publish DMG to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            dist/Mist.dmg dist/Mist.zip \
            --title "Mist ${{ github.ref_name }}" \
            --generate-notes

      - name: Upload DMG artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: Mist-dmg
          path: dist/Mist.dmg

      # Bump the Homebrew cask's version + sha256 in the separate tap repo so
      # `brew upgrade` actually detects new releases — the cask used to pin
      # `version :latest`, which never looks outdated to Homebrew no matter how
      # many releases ship. Requires a HOMEBREW_TAP_TOKEN secret (a PAT with
      # write access to 98przem/homebrew-mist): the default GITHUB_TOKEN is
      # scoped to this repo only and can't push to a different one.
      - name: Bump Homebrew cask
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256=$(shasum -a 256 dist/Mist.dmg | cut -d' ' -f1)
          git clone "https://x-access-token:${GH_TOKEN}@github.com/98przem/homebrew-mist.git" tap
          cd tap
          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/mist.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA256}\"/" Casks/mist.rb
          git config user.name "mist-release-bot"
          git config user.email "actions@github.com"
          git commit -am "Bump to v${VERSION}" || exit 0
          git push origin main
