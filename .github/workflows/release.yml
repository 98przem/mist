name: Release

# Push a version tag (e.g. `git tag v1.0.0 && git push origin v1.0.0`) to build
# the app + bundled tools on a macOS runner and publish a downloadable DMG to a
# GitHub Release. Also runnable manually (uploads the DMG as a run artifact).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest   # Apple Silicon; builds osx-arm64
    steps:
      - uses: actions/checkout@v4

      # macos-latest runners ship with an Android SDK/NDK, several Xcode
      # versions' worth of simulator runtimes, and a Haskell toolchain
      # preinstalled — none needed here, but collectively large enough to leave
      # too little free space for hdiutil to build a DMG ("No space left on
      # device"), which has now hit release builds more than once.
      - name: Free up disk space for the DMG build
        run: |
          sudo rm -rf /Users/runner/Library/Android \
                      /Library/Developer/CoreSimulator/Profiles/Runtimes \
                      /opt/ghc || true
          df -h /

      # The relay targets net10; the patched DepotDownloader targets net9 (its
      # global.json rolls forward, but install both SDKs to be safe).
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Build DMG + zip (app + bundled tools)
        # Bake the tag (minus the leading "v") into the app as its marketing
        # version so the in-app updater can compare against future releases.
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          make release VERSION="${VERSION:-0.0.0}"

      - name: Publish DMG to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            dist/Mist.dmg dist/Mist.zip \
            --title "Mist ${{ github.ref_name }}" \
            --generate-notes

      - name: Upload DMG artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: Mist-dmg
          path: dist/Mist.dmg
