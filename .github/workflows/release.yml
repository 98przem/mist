name: Release

# Push a version tag (e.g. `git tag v1.0.0 && git push origin v1.0.0`) to build
# the app + bundled tools on a macOS runner and publish a downloadable DMG to a
# GitHub Release. Also runnable manually (uploads the DMG as a run artifact).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest   # Apple Silicon; builds osx-arm64
    steps:
      - uses: actions/checkout@v4

      # The relay targets net10; the patched DepotDownloader targets net9 (its
      # global.json rolls forward, but install both SDKs to be safe).
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Build DMG + zip (app + bundled tools)
        run: make release

      - name: Publish DMG to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            dist/Mist.dmg dist/Mist.zip \
            --title "Mist ${{ github.ref_name }}" \
            --generate-notes

      - name: Upload DMG artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: Mist-dmg
          path: dist/Mist.dmg
